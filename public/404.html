<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Sintonía UNAM</title>
    <script>
      // GitHub Pages SPA redirect: convierte /sintonia-unam/algo en /sintonia-unam/?p=algo
      // y la app de React Router lo procesa.
      var seg = 1; // segmentos de la base, ej. /sintonia-unam/ → 1
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
